          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, padding: isMobile ? "12px 16px" : "16px 28px", borderBottom: "1px solid #111827", marginBottom: isMobile ? 16 : 24, overflowX: "auto" }}>
        {tabs.map(tab => (
          <button key={tab.id}
            onClick={() => { setActiveTab(tab.id); setSelectedCategory(null); setSearchActive(false); setSearchQuery(""); setSearchTerm(""); }}
            style={{
              background: activeTab === tab.id ? "#0ea5e9" : "transparent",
              border: activeTab === tab.id ? "none" : "1px solid #1e293b",
              color: activeTab === tab.id ? "#fff" : "#64748b",
              padding: isMobile ? "7px 12px" : "8px 18px", borderRadius: 8, cursor: "pointer",
              fontSize: isMobile ? 12 : 13, fontWeight: 600, fontFamily: "inherit", transition: "all 0.2s",
              display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap", flexShrink: 0,
            }}>
            <span style={{ fontSize: 14 }}>{tab.icon}</span>
            {tab.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: isMobile ? "0 16px 40px" : "0 28px 40px", maxWidth: 800, margin: "0 auto" }}>
        {activeTab === "gastos" && renderGastos()}
        {activeTab === "invest" && renderInvest()}
      </div>

      {renderModal()}

      {/* Card Detail Modal */}
      {selectedCard && (() => {
        const cardTxns = filteredTransactions.filter(t => t.card === selectedCard);
        const cardTotal = cardTxns.reduce((s, t) => s + t.amount, 0);
        const cardColor = CARD_COLORS[selectedCard] || "#64748b";
        return (
          <div onClick={() => setSelectedCard(null)}
            style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: isMobile ? 10 : 20, animation: "fadeIn 0.15s ease" }}>
            <div onClick={(e) => e.stopPropagation()}
              style={{ background: "#0a0e17", borderRadius: 20, width: "100%", maxWidth: 700, maxHeight: "85vh", display: "flex", flexDirection: "column", border: "1px solid #1e293b", animation: "modalIn 0.2s ease" }}>

              {/* Header */}
              <div style={{ padding: isMobile ? "16px 16px 12px" : "24px 28px 16px", borderBottom: "1px solid #1e293b", flexShrink: 0 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: cardColor }} />
                    <h3 style={{ margin: 0, fontSize: 18, color: "#f1f5f9", fontWeight: 700 }}>{selectedCard}</h3>
                  </div>
                  <button onClick={() => setSelectedCard(null)}
                    style={{ background: "transparent", border: "none", color: "#64748b", fontSize: 22, cursor: "pointer", padding: "4px 8px", lineHeight: 1 }}>✕</button>
                </div>
                <p style={{ margin: "6px 0 0", fontSize: 13, color: "#64748b" }}>
                  {selectedMonthLabel} · {cardTxns.length} lançamentos · {fmt(cardTotal)}
                </p>
              </div>

              {/* Table header */}
              {!isMobile && (
                <div style={{ display: "grid", gridTemplateColumns: "120px 1fr 1fr 100px 44px", gap: 8, padding: "10px 28px", borderBottom: "1px solid #111827", flexShrink: 0 }}>
                  <span style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 0.5 }}>Categoria</span>
                  <span style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 0.5 }}>Descrição</span>
                  <span style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 0.5 }}>Nome original</span>
                  <span style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 0.5, textAlign: "right" }}>Valor</span>
                  <span />
                </div>
              )}

              {/* Scrollable transaction list */}
              <div style={{ overflowY: "auto", flex: 1, padding: "4px 0" }}>
                {cardTxns.map((t) => {
                  const meta = categoryMeta[t.cat] || { icon: "❓", color: "#64748b" };
                  const hasRename = t.origDesc && t.origDesc !== t.desc;
                  return isMobile ? (
                    <div key={t._idx} style={{ padding: "10px 16px", borderBottom: "1px solid #0f1219" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1, minWidth: 0 }}>
                          <span style={{ fontSize: 14 }}>{meta.icon}</span>
                          <input type="text" value={t.desc}
                            onChange={(e) => setTransactions(prev => prev.map((tx, i) => i === t._idx ? { ...tx, desc: e.target.value } : tx))}
                            onBlur={(e) => {
                              const newDesc = e.target.value;
                              const origDesc = t.origDesc || newDesc;
                              if (newDesc !== origDesc) requestChange(t._idx, origDesc, newDesc, t.cat);
                            }}
                            style={{ background: "transparent", border: "none", color: "#e2e8f0", fontSize: 13, fontWeight: 500, fontFamily: "inherit", width: "100%", padding: "2px 0", minWidth: 0 }} />
                        </div>
                        <span style={{ fontSize: 13, color: "#f1f5f9", fontWeight: 600, fontVariantNumeric: "tabular-nums", flexShrink: 0, marginLeft: 8 }}>{fmt(t.amount)}</span>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <select value={t.cat}
                          onChange={(e) => requestChange(t._idx, t.origDesc || t.desc, t.desc, e.target.value)}
                          style={{ background: "#0f1219", border: "1px solid #1e293b", borderRadius: 6, color: meta.color, fontSize: 10, padding: "3px 4px", fontFamily: "inherit", cursor: "pointer" }}>
                          {Object.entries(categoryMeta).map(([name, m]) => (
                            <option key={name} value={name}>{m.icon} {name}</option>
                          ))}
                        </select>
                        {hasRename && <span style={{ fontSize: 10, color: "#475569", fontStyle: "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{t.origDesc}</span>}
                        <button onClick={() => {
                            const tx = transactions[t._idx];
                            const key = `${tx.date}|${(tx.origDesc || tx.desc).substring(0,30)}|${tx.amount.toFixed(2)}|${tx.card}`;
                            setDeletedKeys(prev => new Set([...prev, key]));
                            setTransactions(prev => prev.filter((_, i) => i !== t._idx));
                          }}
                          style={{ background: "transparent", border: "none", color: "#475569", fontSize: 12, cursor: "pointer", padding: "2px 6px", marginLeft: "auto", flexShrink: 0 }}>
                          🗑
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div key={t._idx} style={{ display: "grid", gridTemplateColumns: "120px 1fr 1fr 100px 44px", gap: 8, padding: "8px 28px", alignItems: "center", borderBottom: "1px solid #0f1219",
                      transition: "background 0.15s" }}
                      onMouseEnter={(e) => e.currentTarget.style.background = "#111827"}
                      onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>

                      {/* Category selector */}
                      <select value={t.cat}
                        onChange={(e) => {
                          const newCat = e.target.value;
                          const origDesc = t.origDesc || t.desc;
                          requestChange(t._idx, origDesc, t.desc, newCat);
                        }}
                        style={{ background: "#0f1219", border: "1px solid #1e293b", borderRadius: 6, color: meta.color, fontSize: 11, padding: "5px 4px", fontFamily: "inherit", cursor: "pointer", width: "100%" }}>
                        {Object.entries(categoryMeta).map(([name, m]) => (
                          <option key={name} value={name}>{m.icon} {name}</option>
                        ))}
                      </select>

                      {/* Editable description */}
                      <input type="text" value={t.desc}
                        onChange={(e) => {
                          const newDesc = e.target.value;
                          // Local update only while typing
                          setTransactions(prev => prev.map((tx, i) => i === t._idx ? { ...tx, desc: newDesc } : tx));
                        }}
                        onBlur={(e) => {
                          e.target.style.borderColor = "transparent";
                          const newDesc = e.target.value;
                          const origDesc = t.origDesc || newDesc;
                          if (newDesc !== origDesc) {
                            requestChange(t._idx, origDesc, newDesc, t.cat);
                          }
                        }}
                        style={{ background: "transparent", border: "1px solid transparent", borderRadius: 6, color: "#e2e8f0", fontSize: 12, padding: "5px 8px", fontFamily: "inherit", width: "100%",
                          transition: "border-color 0.15s" }}
                        onFocus={(e) => e.target.style.borderColor = "#334155"} />

                      {/* Original description */}
                      <span style={{ fontSize: 11, color: hasRename ? "#475569" : "transparent", fontStyle: "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {hasRename ? t.origDesc : "—"}
                      </span>

                      {/* Amount */}
                      <span style={{ fontSize: 12, color: "#f1f5f9", fontWeight: 500, textAlign: "right", fontVariantNumeric: "tabular-nums" }}>
                        {fmt(t.amount)}
                      </span>

                      {/* Delete button */}
                      <button onClick={() => {
                          const tx = transactions[t._idx];
                          const key = `${tx.date}|${(tx.origDesc || tx.desc).substring(0,30)}|${tx.amount.toFixed(2)}|${tx.card}`;
                          setDeletedKeys(prev => new Set([...prev, key]));
                          setTransactions(prev => prev.filter((_, i) => i !== t._idx));
                        }}
                        title="Excluir lançamento"
                        style={{ background: "transparent", border: "1px solid transparent", borderRadius: 6, color: "#64748b", fontSize: 13, cursor: "pointer", padding: "4px 8px", transition: "all 0.15s", fontFamily: "inherit" }}
                        onMouseEnter={(e) => { e.currentTarget.style.color = "#ef4444"; e.currentTarget.style.borderColor = "#7f1d1d"; e.currentTarget.style.background = "rgba(239,68,68,0.08)"; }}
                        onMouseLeave={(e) => { e.currentTarget.style.color = "#64748b"; e.currentTarget.style.borderColor = "transparent"; e.currentTarget.style.background = "transparent"; }}>
                        🗑
                      </button>
                    </div>
                  );
                })}
                {cardTxns.length === 0 && (
                  <p style={{ textAlign: "center", padding: 32, color: "#475569", fontSize: 13 }}>Nenhum lançamento para este cartão no período.</p>
                )}
              </div>

              {/* Footer */}
              <div style={{ padding: isMobile ? "12px 16px" : "14px 28px", borderTop: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
                <span style={{ fontSize: 13, color: "#64748b" }}>{cardTxns.length} lançamentos</span>
                <button onClick={() => setSelectedCard(null)}
                  style={{ padding: "8px 20px", borderRadius: 10, border: "none", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", background: "linear-gradient(135deg, #0ea5e9, #0369a1)" }}>
                  Fechar
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Category Manager Modal */}
      {showCatManager && (
        <div onClick={() => { setShowCatManager(false); setEditingCat(null); }}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: isMobile ? 10 : 20, animation: "fadeIn 0.15s ease" }}>
          <div onClick={(e) => e.stopPropagation()}
            style={{ background: "#0a0e17", borderRadius: 20, width: "100%", maxWidth: 520, maxHeight: "85vh", display: "flex", flexDirection: "column", border: "1px solid #1e293b", animation: "modalIn 0.2s ease" }}>

            <div style={{ padding: "24px 28px 16px", borderBottom: "1px solid #1e293b", flexShrink: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <h3 style={{ margin: 0, fontSize: 18, color: "#f1f5f9", fontWeight: 700 }}>Gerenciar Categorias</h3>
                <button onClick={() => { setShowCatManager(false); setEditingCat(null); }}
                  style={{ background: "transparent", border: "none", color: "#64748b", fontSize: 22, cursor: "pointer", padding: "4px 8px", lineHeight: 1 }}>✕</button>
              </div>
            </div>

            {/* Existing categories */}
            <div style={{ overflowY: "auto", flex: 1, padding: "8px 0" }}>
              {Object.entries(categoryMeta).map(([name, meta]) => {
                const isEditing = editingCat?.origName === name;
                return isEditing ? (
                  <div key={name} style={{ padding: "12px 28px", borderBottom: "1px solid #0f1219", background: "#111827" }}>
                    <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                      <input type="text" value={editingCat.name}
                        onChange={(e) => setEditingCat(prev => ({ ...prev, name: e.target.value }))}
                        style={{ ...inputStyle, flex: 1, fontSize: 13, padding: "8px 12px" }} />
                      <button onClick={() => {
                          if (!editingCat.name.trim()) return;
                          setCategoryMeta(prev => {
                            const next = {};
                            for (const [k, v] of Object.entries(prev)) {
                              if (k === editingCat.origName) {
                                next[editingCat.name.trim()] = { icon: editingCat.icon, color: editingCat.color };
                              } else next[k] = v;
                            }
                            return next;
                          });
                          // Rename category in all transactions
                          if (editingCat.name.trim() !== editingCat.origName) {
                            setTransactions(prev => prev.map(t =>
                              t.cat === editingCat.origName ? { ...t, cat: editingCat.name.trim() } : t
                            ));
                          }
                          setEditingCat(null);
                        }}
                        style={{ padding: "8px 14px", borderRadius: 8, border: "none", color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", background: "linear-gradient(135deg, #0ea5e9, #0369a1)" }}>
                        Salvar
                      </button>
                      <button onClick={() => setEditingCat(null)}
                        style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid #1e293b", background: "transparent", color: "#94a3b8", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
                        ✕
                      </button>
                    </div>
                    {/* Inline icon picker */}
                    <div style={{ marginBottom: 6 }}>
                      <p style={{ margin: "0 0 4px", fontSize: 10, color: "#475569" }}>Ícone</p>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>
                        {ICON_OPTIONS.map(ic => (
                          <button key={ic} onClick={() => setEditingCat(prev => ({ ...prev, icon: ic }))}
                            style={{ width: 28, height: 28, borderRadius: 5, border: editingCat.icon === ic ? "2px solid #0ea5e9" : "1px solid #1e293b",
                              background: editingCat.icon === ic ? "rgba(14,165,233,0.1)" : "transparent",
                              fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                            {ic}
                          </button>
                        ))}
                      </div>
                    </div>
                    {/* Inline color picker */}
                    <div>
                      <p style={{ margin: "0 0 4px", fontSize: 10, color: "#475569" }}>Cor</p>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>
                        {COLOR_OPTIONS.map(c => (
                          <button key={c} onClick={() => setEditingCat(prev => ({ ...prev, color: c }))}
                            style={{ width: 20, height: 20, borderRadius: "50%", border: editingCat.color === c ? "2px solid #fff" : "2px solid transparent",
                              background: c, cursor: "pointer" }} />
                        ))}
                      </div>
                    </div>
                  </div>
                ) : (
                  <div key={name} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 28px", borderBottom: "1px solid #0f1219" }}>
                    <span style={{ fontSize: 18, width: 28, textAlign: "center" }}>{meta.icon}</span>
                    <div style={{ width: 12, height: 12, borderRadius: "50%", background: meta.color, flexShrink: 0 }} />
                    <span style={{ flex: 1, fontSize: 14, color: "#e2e8f0" }}>{name}</span>
                    <button onClick={() => setEditingCat({ origName: name, name, icon: meta.icon, color: meta.color })}
                      style={{ background: "transparent", border: "none", color: "#475569", fontSize: 12, cursor: "pointer", padding: "4px 8px", borderRadius: 6, fontFamily: "inherit", transition: "color 0.15s" }}
                      onMouseEnter={(e) => e.currentTarget.style.color = "#0ea5e9"}
                      onMouseLeave={(e) => e.currentTarget.style.color = "#475569"}>
                      editar
                    </button>
                    {!["Alimentação","Compras","Transporte","Saúde","Lazer","Assinaturas","Encargos"].includes(name) && (
                      <button onClick={() => {
                          setCategoryMeta(prev => {
                            const next = { ...prev };
                            delete next[name];
                            return next;
                          });
                        }}
                        style={{ background: "transparent", border: "none", color: "#475569", fontSize: 12, cursor: "pointer", padding: "4px 8px", borderRadius: 6, fontFamily: "inherit", transition: "color 0.15s" }}
                        onMouseEnter={(e) => e.currentTarget.style.color = "#ef4444"}
                        onMouseLeave={(e) => e.currentTarget.style.color = "#475569"}>
                        remover
                      </button>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Add new category */}
            <div style={{ padding: "16px 28px", borderTop: "1px solid #1e293b", flexShrink: 0 }}>
              <p style={{ margin: "0 0 10px", fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5 }}>Nova categoria</p>
              <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                <input type="text" placeholder="Nome da categoria"
                  value={newCatForm.name}
                  onChange={(e) => setNewCatForm(prev => ({ ...prev, name: e.target.value }))}
                  style={{ ...inputStyle, flex: 1, fontSize: 13, padding: "8px 12px" }} />
                <button onClick={() => {
                    if (!newCatForm.name.trim()) return;
                    if (categoryMeta[newCatForm.name.trim()]) return;
                    setCategoryMeta(prev => ({
                      ...prev,
                      [newCatForm.name.trim()]: { icon: newCatForm.icon, color: newCatForm.color },
                    }));
                    setNewCatForm({ name: "", icon: "📦", color: "#06B6D4" });
                  }}
                  style={{ padding: "8px 16px", borderRadius: 10, border: "none", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", background: "linear-gradient(135deg, #0ea5e9, #0369a1)", whiteSpace: "nowrap" }}>
                  + Adicionar
                </button>
              </div>

              {/* Icon picker */}
              <div style={{ marginBottom: 8 }}>
                <p style={{ margin: "0 0 6px", fontSize: 11, color: "#475569" }}>Ícone</p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                  {ICON_OPTIONS.map(ic => (
                    <button key={ic} onClick={() => setNewCatForm(prev => ({ ...prev, icon: ic }))}
                      style={{ width: 32, height: 32, borderRadius: 6, border: newCatForm.icon === ic ? "2px solid #0ea5e9" : "1px solid #1e293b",
                        background: newCatForm.icon === ic ? "rgba(14,165,233,0.1)" : "transparent",
                        fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {ic}
                    </button>
                  ))}
                </div>
              </div>

              {/* Color picker */}
              <div>
                <p style={{ margin: "0 0 6px", fontSize: 11, color: "#475569" }}>Cor</p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                  {COLOR_OPTIONS.map(c => (
                    <button key={c} onClick={() => setNewCatForm(prev => ({ ...prev, color: c }))}
                      style={{ width: 24, height: 24, borderRadius: "50%", border: newCatForm.color === c ? "2px solid #fff" : "2px solid transparent",
                        background: c, cursor: "pointer", transition: "transform 0.15s" }}
                      onMouseEnter={(e) => e.currentTarget.style.transform = "scale(1.2)"}
                      onMouseLeave={(e) => e.currentTarget.style.transform = "scale(1)"} />
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Confirmation Modal: Apply to all or just this one */}
      {pendingChange && (() => {
        const origKey = pendingChange.origDesc.toLowerCase().trim();
        const matchCount = transactions.filter(t => (t.origDesc || t.desc).toLowerCase().trim() === origKey).length;
        const descChanged = pendingChange.newDesc !== pendingChange.origDesc;
        const catChanged = (() => {
          const orig = transactions[pendingChange.idx];
          return orig && pendingChange.newCat !== orig.cat;
        })();
        const changeLabel = descChanged && catChanged
          ? `"${pendingChange.newDesc}" + nova categoria`
          : descChanged ? `"${pendingChange.newDesc}"`
          : `Nova categoria: ${pendingChange.newCat}`;
        return (
          <div onClick={() => {
              // Cancel: revert the local change
              setPendingChange(null);
            }}
            style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, animation: "fadeIn 0.15s ease", padding: isMobile ? 16 : 20 }}>
            <div onClick={(e) => e.stopPropagation()}
              style={{ background: "#0f1219", borderRadius: 20, padding: isMobile ? 20 : 28, width: "100%", maxWidth: 380, border: "1px solid #1e293b", animation: "modalIn 0.2s ease" }}>
              <h3 style={{ margin: "0 0 8px", fontSize: 17, color: "#f1f5f9", fontWeight: 700 }}>Aplicar alteração</h3>
              <p style={{ margin: "0 0 6px", fontSize: 13, color: "#94a3b8" }}>{changeLabel}</p>
              <p style={{ margin: "0 0 24px", fontSize: 12, color: "#64748b" }}>
                {matchCount > 1 ? `Encontrados ${matchCount} lançamentos com a mesma descrição original.` : "Este é o único lançamento com essa descrição."}
              </p>

              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {matchCount > 1 && (
                  <button onClick={() => confirmChange(true)}
                    style={{ padding: "12px 20px", borderRadius: 12, border: "none", color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                      background: "linear-gradient(135deg, #0ea5e9, #0369a1)", transition: "all 0.2s" }}>
                    Aplicar a todos ({matchCount} lançamentos)
                  </button>
                )}
                <button onClick={() => confirmChange(false)}
                  style={{ padding: "12px 20px", borderRadius: 12, border: "1px solid #1e293b", color: "#e2e8f0", fontSize: 14, fontWeight: 500, cursor: "pointer", fontFamily: "inherit",
                    background: matchCount > 1 ? "transparent" : "linear-gradient(135deg, #0ea5e9, #0369a1)", transition: "all 0.2s" }}>
                  {matchCount > 1 ? "Somente este lançamento" : "Aplicar"}
                </button>
                <button onClick={() => setPendingChange(null)}
                  style={{ padding: "10px 20px", borderRadius: 12, border: "none", color: "#64748b", fontSize: 13, cursor: "pointer", fontFamily: "inherit", background: "transparent" }}>
                  Cancelar
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Transaction Edit Modal */}
      {editingTx && (
        <div onClick={() => setEditingTx(null)}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, animation: "fadeIn 0.15s ease", padding: isMobile ? 10 : 20 }}>
          <div onClick={(e) => e.stopPropagation()}
            style={{ background: "#0f1219", borderRadius: 20, padding: isMobile ? 20 : 28, width: "100%", maxWidth: 420, border: "1px solid #1e293b", animation: "modalIn 0.2s ease" }}>
            <h3 style={{ margin: "0 0 24px", fontSize: 18, color: "#f1f5f9", fontWeight: 700 }}>Editar Lançamento</h3>

            <div style={{ marginBottom: 18 }}>
              <label style={labelStyle}>Descrição</label>
              <input type="text" value={editingTx.desc}
                onChange={(e) => setEditingTx(prev => ({ ...prev, desc: e.target.value }))}
                style={{ ...inputStyle, fontSize: 15 }} />
            </div>

            <div style={{ marginBottom: 24 }}>
              <label style={labelStyle}>Categoria</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {Object.entries(categoryMeta).map(([name, meta]) => (
                  <button key={name} onClick={() => setEditingTx(prev => ({ ...prev, cat: name }))}
                    style={{
                      padding: "7px 14px", borderRadius: 8, fontSize: 13, fontWeight: 500,
                      fontFamily: "inherit", cursor: "pointer", transition: "all 0.2s",
                      display: "flex", alignItems: "center", gap: 5,
                      background: editingTx.cat === name ? meta.color + "22" : "transparent",
                      border: editingTx.cat === name ? `1.5px solid ${meta.color}` : "1px solid #1e293b",
                      color: editingTx.cat === name ? meta.color : "#64748b",
                    }}>
                    <span style={{ fontSize: 14 }}>{meta.icon}</span>
                    {name}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
              <button onClick={() => setEditingTx(null)}
                style={{ padding: "10px 24px", borderRadius: 10, background: "transparent", border: "1px solid #1e293b", color: "#94a3b8", fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
                Cancelar
              </button>
              <button onClick={saveTx}
                style={{ padding: "10px 24px", borderRadius: 10, border: "none", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", background: "linear-gradient(135deg, #0ea5e9, #0369a1)" }}>
                Salvar
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ControlApp));
  </script>

  <script>
    // Register Service Worker for PWA
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
