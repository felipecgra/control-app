function resolveYear(monthNum, faturaKey) {
  const [fy, fm] = faturaKey.split("-").map(Number);
  if (monthNum > fm + 2) return fy - 1;
  if (fm <= 3 && monthNum >= 10) return fy - 1;
  return fy;
}

function detectCardType(text) {
  const t = text.toLowerCase();
  if (t.includes("btg pactual") || t.includes("cartão black") || t.includes("btg pactual s.a")) return "BTG";
  if (t.includes("visa infinite") || t.includes("visa  infinite")) return "Visa Inf";
  if (t.includes("latam pass") || t.includes("latampass")) return "Itaú LP";
  // Generic Itaú credit card — try to identify by card variant
  if (t.includes("visa platinum")) return "Itaú Plat";
  if (t.includes("visa gold")) return "Itaú Gold";
  if (t.includes("mastercard") && (t.includes("itaú") || t.includes("itau"))) return "Itaú MC";
  if (t.includes("itaucard") || t.includes("itaú") || t.includes("itau")) return "Itaú LP";
  return null;
}

function detectFatura(text) {
  const monthMap = { "janeiro":"01","fevereiro":"02","março":"03","marco":"03","abril":"04",
    "maio":"05","junho":"06","julho":"07","agosto":"08","setembro":"09","outubro":"10",
    "novembro":"11","dezembro":"12","jan":"01","fev":"02","mar":"03","abr":"04","mai":"05",
    "jun":"06","jul":"07","ago":"08","set":"09","out":"10","nov":"11","dez":"12" };
  // Try "Vencimento DD/MM/YYYY" or "vencimento: DD/MM/YYYY"
  const venc = text.match(/vencimento[:\s]*(\d{2})\/(\d{2})\/(\d{4})/i);
  if (venc) {
    const m = parseInt(venc[2]);
    const y = parseInt(venc[3]);
    return `${y}-${String(m).padStart(2,"0")}`;
  }
  // Try "Fatura de MONTH YEAR"
  const fm = text.match(/fatura\s+(?:de\s+)?(janeiro|fevereiro|março|marco|abril|maio|junho|julho|agosto|setembro|outubro|novembro|dezembro)\s+(?:de\s+)?(\d{4})/i);
  if (fm) {
    const m = monthMap[fm[1].toLowerCase()];
    return `${fm[2]}-${m}`;
  }
  return null;
}

function parseBTG(text, faturaKey) {
  const transactions = [];
  const monthMap = {"Jan":1,"Fev":2,"Mar":3,"Abr":4,"Mai":5,"Jun":6,"Jul":7,"Ago":8,"Set":9,"Out":10,"Nov":11,"Dez":12};
  const pattern = /(\d{2})\s+(Jan|Fev|Mar|Abr|Mai|Jun|Jul|Ago|Set|Out|Nov|Dez)\s+([A-Za-z][\w\s\*\(\)\/\-\.\']+?)\s+(?:[-]\s*)?R\$\s*([\d.,]+)/g;
  const skip = ["pagamento de fatura","mensalidade seguros","contratacao seguro","total de compras","total do cart"];
  let m;
  while ((m = pattern.exec(text)) !== null) {
    const day = parseInt(m[1]);
    const monthName = m[2];
    let desc = m[3].trim();
    const amountStr = m[4];
    if (skip.some(s => desc.toLowerCase().includes(s))) continue;
    let amount = parseFloat(amountStr.replace(/\./g,"").replace(",","."));
    const pre = text.substring(Math.max(0, m.index - 5), m.index + m[0].length);
    if (pre.includes("- R$") || pre.includes("-R$")) amount = -amount;
    const monthNum = monthMap[monthName];
    const year = resolveYear(monthNum, faturaKey);
    const date = `${year}-${String(monthNum).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    transactions.push({ date, desc, amount, card: "BTG", cat: categorize(desc), fatura: faturaKey });
  }
  return transactions;
}

function parseItau(text, cardName, faturaKey) {
  const transactions = [];
  const lines = text.split("\n");
  let inProximas = false;
  const skipKw = ["total da fatura","pagamento efetuado","lançamentos atuais","total desta fatura",
    "próxima fatura","demais faturas","total para próximas","lançamentos no cartão",
    "total dos lançamentos","total transações","repasse de iof","total lançamentos",
    "valor total financiado","valor solicitado","total a pagar","valor compra","valor do iof",
    "valor juros","valor da parcela","valor saque","valor tarifa","encargos","pagamento mínimo",
    "parcelas fixas","limite total","limite disponível","limite máximo","limite total utilizado",
    "anuidade diferenci","estorno de anuidade","lançamentos internacionais","dólar de conversão",
    "total de obrigações","produtos/serviços","estabelecimento","valor em r"];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (/pr[óo]ximas?\s+faturas?/i.test(line)) { inProximas = true; continue; }
    if (inProximas) {
      if (/lan[çc]amentos.*compras/i.test(line) || /limites?\s+de\s+cr[ée]dito/i.test(line) ||
          /simula[çc][ãa]o/i.test(line) || /total\s+dos\s+lan[çc]amentos/i.test(line) ||
          /encargos\s+cobrados/i.test(line)) { inProximas = false; } else continue;
    }
    if (skipKw.some(kw => line.toLowerCase().includes(kw))) continue;
    const txPattern = /(\d{2}\/\d{2})\s+(.+?)\s+([-]?\d{1,3}(?:\.\d{3})*,\d{2})/g;
    let match;
    while ((match = txPattern.exec(line)) !== null) {
      const dateStr = match[1];
      let desc = match[2].trim();
      const amountStr = match[3];
      let neg = false;
      const preAmt = line.substring(Math.max(0, match.index + match[1].length + match[2].length), match.index + match[0].length);
      if (line.substring(Math.max(0, match.index - 3), match.index + match[0].length).includes("- ")) neg = true;
      let amount = parseFloat(amountStr.replace(/\./g,"").replace(",","."));
      if (neg || amountStr.startsWith("-")) amount = -Math.abs(amount);
      if (Math.abs(amount) < 0.50) continue;
      // Category from next line (Itaú puts category below)
      let cat = "Compras";
      if (i + 1 < lines.length) {
        const nextLine = lines[i + 1].trim().toUpperCase();
        for (const [itauCat, appCat] of Object.entries(ITAU_CAT_MAP)) {
          if (nextLine.includes(itauCat)) { cat = appCat; break; }
        }
      }
      const [dd, mm] = dateStr.split("/").map(Number);
      const year = resolveYear(mm, faturaKey);
      const fullDate = `${year}-${String(mm).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
      if (desc.toLowerCase().includes("produtos/serviços") || desc.toLowerCase().includes("estabelecimento")) continue;
      transactions.push({ date: fullDate, desc, amount, card: cardName, cat, fatura: faturaKey });
    }
  }
  return transactions;
}

function dedup(txns) {
  const seen = new Set();
  return txns.filter(t => {
    const key = `${t.date}|${t.desc.substring(0,30)}|${t.amount.toFixed(2)}|${t.card}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

// ─── Extrato (Conta Corrente) Parsers ───

function detectExtrato(text) {
  if (!text || typeof text !== "string") return null;
  const t = text.toLowerCase();
  
  // Extrato indicators
  const extratoKeywords = ["saldo do dia","saldo em conta","conta corrente","saldo anterior",
    "saldo disponível","saldo disponivel","lançamentos em conta","lancamentos em conta",
    "saldo final","saldo inicial","saldo parcial","extrato"];
  if (!extratoKeywords.some(kw => t.includes(kw))) return null;
  
  if (t.includes("btg pactual")) return "BTG CC";
  if (t.includes("itaú") || t.includes("itau")) return "Itaú CC";
  return null;
}

function parseBTGExtrato(text, faturaKey) {
  const results = [];
  if (!text) return results;
  const lines = text.split(/\n/);
  const dateRe = /^(\d{2}\/\d{2}\/\d{4})\s+\d{2}h\d{2}/;
  const valueRe = /(-?)R\$\s*([\d.,]+)\s*$/;
  let buffer = [];
  const flush = () => {
    if (buffer.length === 0) return;
    const joined = buffer.join(" ").replace(/\s+/g, " ").trim();
    buffer = [];
    processLine(joined);
  };
  const processLine = (line) => {
    const dm = line.match(dateRe);
    if (!dm) return;
    const vm = line.match(valueRe);
    if (!vm) return;
    const dateStr = dm[1];
    const sign = vm[1];
    const rawVal = vm[2];
    const amount = parseFloat(rawVal.replace(/\./g, "").replace(",", "."));
    if (isNaN(amount) || amount === 0) return;
    if (sign !== "-") return; // skip credits
    const afterDate = line.replace(dateRe, "").trim();
    const middle = afterDate.replace(valueRe, "").trim();
    if (/saldo\s+di[aá]rio/i.test(middle)) return;
    if (/pagamento de fatura do cart/i.test(middle)) return;
    if (/iof\s+limite/i.test(middle)) return;
    if (/juros\s*-?\s*limite/i.test(middle)) return;
    if (/encargos de mora/i.test(middle)) return;
    if (/transfer[eê]ncia\s+enviada.*felipe\s+cardoso/i.test(middle)) return;
    if (/parcela\s+cr[eé]dito\s+por\s+investimentos/i.test(middle)) return;
    if (/felipe\s+cardoso\s+granero/i.test(middle)) return;
    let desc = middle;
    const catPrefixes = [
      /^(Transfer[eê]ncia|Doa[cç][oõ]es|Contas|Educa[cç][aã]o|Sa[uú]de|Seguro|Compras|Tarifas|Viagem|Cuidados\s*Pessoais|Lazer\s*e?\s*Entretenimento|Cr[eé]dito\s*e?\s*Financiamento|Outra\s*Categoria|Alimenta[cç][aã]o|Impostos\s*e?\s*Tributos|Saque)\s*/i,
    ];
    for (const re of catPrefixes) desc = desc.replace(re, "").trim();
    const txPrefixes = [
      /^pix\s+enviado\s+(via\s+assistente\s+virtual\s+no\s+whatsapp\s+)?/i,
      /^pagamento\s+de\s+boleto\s*/i,
      /^pagamento\s+de\s+conta\s*/i,
      /^d[eé]bito\s+autom[aá]tico\s*/i,
      /^saque\s+banco24horas\s+qr\s+code\s*/i,
      /^pix\s+enviado\s*/i,
    ];
    for (const re of txPrefixes) desc = desc.replace(re, "").trim();
    desc = desc.replace(/^pagamento\s+para\s+/i, "").trim();
    if (!desc) desc = middle;
    const [dd, mm, yyyy] = dateStr.split("/");
    const isoDate = `${yyyy}-${mm}-${dd}`;
    results.push({ date: isoDate, desc, amount, card: "BTG CC", cat: categorize(desc), fatura: `${yyyy}-${mm}` });
  };
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) { flush(); continue; }
    if (dateRe.test(line)) flush();
    buffer.push(line);
  }
  flush();
  return results;
}

function parseItauExtrato(text, faturaKey) {
  const results = [];
  if (!text) return results;
  const lines = text.split(/\n/);
  const lineRe = /^(\d{2}\/\d{2}\/\d{4})\s+(.+?)\s+(-?[\d.,]+)\s*$/;
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;
    const m = line.match(lineRe);
    if (!m) continue;
    const dateStr = m[1];
    let desc = m[2].trim();
    const rawVal = m[3];
    const amount = parseFloat(rawVal.replace(/\./g, "").replace(",", "."));
    if (isNaN(amount)) continue;
    if (amount >= 0) continue; // skip credits
    const absAmount = Math.abs(amount);
    if (/saldo\s+do\s+dia/i.test(desc)) continue;
    if (/rend\s+pago/i.test(desc)) continue;
    if (/juros\s+limite/i.test(desc)) continue;
    if (/^iof$/i.test(desc.trim())) continue;
    if (/itau\s+visa/i.test(desc)) continue;
    if (/itau\s+mc/i.test(desc)) continue;
    if (/pers\s+infinit/i.test(desc)) continue;
    if (/crediario/i.test(desc)) continue;
    if (/aplicacao\s+cdb/i.test(desc)) continue;
    if (/credito\s+cartao/i.test(desc)) continue;
    if (/int\s+latam\s+pass/i.test(desc)) continue;
    if (/pix\s+transf\s+felipe/i.test(desc)) continue;
    desc = desc.replace(/\s*\d{2}\/\d{2}\s*$/, "").trim();
    desc = desc
      .replace(/^pix\s+transf\s+/i, "")
      .replace(/^pix\s+qrs\s+/i, "")
      .replace(/^pay\s+/i, "")
      .replace(/^da\s+/i, "")
      .replace(/^sispag\s+/i, "")
      .replace(/^pag\s+tit\s+int\s*/i, "")
      .trim();
    if (!desc) continue;
    const [dd, mm, yyyy] = dateStr.split("/");
    const isoDate = `${yyyy}-${mm}-${dd}`;
    results.push({ date: isoDate, desc, amount: absAmount, card: "Itaú CC", cat: categorize(desc), fatura: `${yyyy}-${mm}` });
  }
  return results;
}

async function extractPdfText(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageLines = {};
    content.items.forEach(item => {
      const y = Math.round(item.transform[5]);
      if (!pageLines[y]) pageLines[y] = [];
      pageLines[y].push({ x: item.transform[4], text: item.str });
    });
    const sortedYs = Object.keys(pageLines).map(Number).sort((a, b) => b - a);
    for (const y of sortedYs) {
      const lineItems = pageLines[y].sort((a, b) => a.x - b.x);
      text += lineItems.map(i => i.text).join(" ") + "\n";
    }
    text += "\n";
  }
  return text;
}

function DonutChart({ categories, totalSpend }) {
  const size = 200, strokeWidth = 32;
  const radius = (size - strokeWidth) / 2;
  const circumference = 2 * Math.PI * radius;
  const safeTotalSpend = totalSpend || 1;
  const cx = size / 2, cy = size / 2;

  const segments = [];
  let offset = 0;
  categories.forEach((cat) => {
    const pct = cat.total / safeTotalSpend;
    const dash = pct * circumference;
    segments.push({ name: cat.name, color: cat.color, dash, gap: circumference - dash, offset });
    offset += dash;
  });

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={radius} fill="none" stroke="#1a1f2e" strokeWidth={strokeWidth} />
      {segments.map((seg) => (
        <circle key={seg.name} cx={cx} cy={cy} r={radius} fill="none"
          stroke={seg.color} strokeWidth={strokeWidth}
          strokeDasharray={`${seg.dash} ${seg.gap}`}
          strokeDashoffset={circumference * 0.25 - seg.offset}
          strokeLinecap="butt" />
      ))}
      <text x={cx} y={cy - 10} textAnchor="middle" fill="#94a3b8" fontSize="11" fontFamily="inherit">Total</text>
      <text x={cx} y={cy + 14} textAnchor="middle" fill="#f1f5f9" fontSize="18" fontWeight="700" fontFamily="inherit">{fmtK(totalSpend)}</text>
    </svg>
  );
}

function BarChart({ data, selectedMonth }) {
  if (!data || data.length === 0) return null;
  const max = Math.max(...data.map(d => d.total));
  const padTop = 22, padBot = 22, padLeft = 4, padRight = 4;
  const w = 320, h = 150;
  const chartH = h - padTop - padBot;
  const chartW = w - padLeft - padRight;
  const n = data.length;
  const barGap = Math.max(4, Math.min(10, chartW / n * 0.25));
  const barW = Math.max(8, (chartW - barGap * (n + 1)) / n);

  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
      {/* Grid lines */}
      {[0, 0.33, 0.66, 1].map((pct, i) => {
        const y = padTop + chartH * (1 - pct);
        return <line key={i} x1={padLeft} y1={y} x2={w - padRight} y2={y} stroke="#1e293b" strokeWidth="0.5" strokeDasharray="3,3" />;
      })}
      {data.map((d, i) => {
        const barH = max > 0 ? Math.max((d.total / max) * chartH, 3) : 3;
        const x = padLeft + barGap + i * (barW + barGap);
        const y = padTop + chartH - barH;
        const isActive = selectedMonth ? d.month === selectedMonth : i === data.length - 1;
        return (
          <g key={d.month + i}>
            <rect x={x} y={y} width={barW} height={barH} rx={barW > 12 ? 4 : 3}
              fill={isActive ? "url(#barGrad)" : "#1e293b"} />
            {/* Value label */}
            <text x={x + barW / 2} y={y - 5} textAnchor="middle"
              fill={isActive ? "#e2e8f0" : "#64748b"} fontSize={n > 8 ? 7 : 9} fontWeight="500" fontFamily="inherit">
              {fmtK(d.total)}
            </text>
            {/* Month label */}
            <text x={x + barW / 2} y={h - 4} textAnchor="middle"
              fill={isActive ? "#f1f5f9" : "#475569"} fontSize={n > 8 ? 8 : 10} fontWeight={isActive ? 600 : 400} fontFamily="inherit">
              {d.month}
            </text>
          </g>
        );
      })}
      <defs>
        <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#0ea5e9" />
          <stop offset="100%" stopColor="#0369a1" />
        </linearGradient>
      </defs>
    </svg>
  );
}

function LineChart({ data }) {
  const max = Math.max(...data.map(d => d.total));
  const min = Math.min(...data.map(d => d.total));
  const range = max - min || 1;
  const padTop = 30, padBot = 30, padLeft = 10, padRight = 10;
  const w = 360, h = 160;
  const chartW = w - padLeft - padRight;
  const chartH = h - padTop - padBot;
  const points = data.map((d, i) => ({
    x: padLeft + (i / (data.length - 1)) * chartW,
    y: padTop + chartH - ((d.total - min) / range) * chartH, ...d,
  }));
  const line = points.map((p, i) => (i === 0 ? `M${p.x},${p.y}` : `L${p.x},${p.y}`)).join(" ");
  const area = `${line} L${points[points.length-1].x},${padTop + chartH} L${points[0].x},${padTop + chartH} Z`;
  const last = points[points.length - 1];
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ overflow: "visible" }}>
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#0ea5e9" stopOpacity="0.25" />
          <stop offset="100%" stopColor="#0ea5e9" stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0, 0.5, 1].map((pct, i) => {
        const y = padTop + chartH * (1 - pct);
        return <line key={i} x1={padLeft} y1={y} x2={w - padRight} y2={y} stroke="#1e293b" strokeWidth="1" strokeDasharray="4,4" />;
      })}
      <path d={area} fill="url(#areaGrad)" />
      <path d={line} fill="none" stroke="#0ea5e9" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {points.map((p, i) => (
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={i === points.length - 1 ? 5 : 3} fill={i === points.length - 1 ? "#0ea5e9" : "#0f1219"} stroke="#0ea5e9" strokeWidth="2" />
          <text x={p.x} y={padTop + chartH + 18} textAnchor="middle" fill={i === points.length - 1 ? "#f1f5f9" : "#64748b"} fontSize="11" fontWeight={i === points.length - 1 ? 600 : 400} fontFamily="inherit">{p.month}</text>
        </g>
      ))}
      <text x={last.x} y={last.y - 12} textAnchor="middle" fill="#0ea5e9" fontSize="12" fontWeight="600" fontFamily="inherit">{fmtK(last.total)}</text>
    </svg>
  );
}

  // Pending change confirmation
  const [pendingChange, setPendingChange] = useState(null); // { idx, origDesc, newDesc, newCat }

  // Apply rename/recat globally to ALL transactions with the same original description
  const applyGlobalChange = (origDesc, newDesc, newCat) => {
    const origKey = origDesc.toLowerCase().trim();
    setTransactions(prev => prev.map(t => {
      const txOrigKey = (t.origDesc || t.desc).toLowerCase().trim();

      }
      return t;
    }));
    setRenameMap(prev => ({ ...prev, [origKey]: { desc: newDesc, cat: newCat } }));
  };

  // Apply change to a single transaction only
  const applySingleChange = (idx, newDesc, newCat) => {
    setTransactions(prev => prev.map((t, i) => {

  };

  // Confirm the pending change
  const confirmChange = (applyToAll) => {
    if (!pendingChange) return;
    if (applyToAll) {
      applyGlobalChange(pendingChange.origDesc, pendingChange.newDesc, pendingChange.newCat);

      applySingleChange(pendingChange.idx, pendingChange.newDesc, pendingChange.newCat);
    }
    setPendingChange(null);
  };

    if (!editingTx) return;
    const origDesc = editingTx.origDesc || transactions[editingTx.index]?.origDesc || transactions[editingTx.index]?.desc;
    requestChange(editingTx.index, origDesc, editingTx.desc, editingTx.cat);
    setEditingTx(null);
  };

  // ─── PDF Import Handler ───

  const handleFilesImport = async (fileList) => {
    if (!pdfReady || fileList.length === 0) return;
    const files = Array.from(fileList);
    setImportState({ step: "loading", fileName: files.length === 1 ? files[0].name : `${files.length} arquivos` });

    try {
      const allNew = [];
      let totalDuplicates = 0;
      let totalRenamed = 0;
      const fileResults = [];
      const errors = [];
      const currentMap = { ...renameMap };
      // Build existing keys including what we add along the way
      const existingKeys = new Set(transactions.map(t =>
        `${t.date}|${(t.origDesc || t.desc).substring(0,30)}|${t.amount.toFixed(2)}|${t.card}`
      ));

      for (const file of files) {
        try {
          const text = await extractPdfText(file);
          let card, parsed, fatura, isExtrato;

          // Auto-detect type: credit card first (has strong brand signals), then extrato
          card = detectCardType(text);
          isExtrato = false;
          if (!card) {
            card = detectExtrato(text);
            isExtrato = !!card;
          }
          if (!card) {
            errors.push(`${file.name}: tipo não identificado`);
            continue;
          }

          if (isExtrato) {
            parsed = card === "BTG CC" ? parseBTGExtrato(text) : parseItauExtrato(text);
            const months = [...new Set(parsed.map(t => t.fatura))].sort();
            fatura = months.length > 0 ? months[months.length - 1] : null;
            if (parsed.length === 0) { errors.push(`${file.name}: nenhum lançamento encontrado`); continue; }
          } else {
            fatura = detectFatura(text);
            if (!fatura) { errors.push(`${file.name}: mês da fatura não identificado`); continue; }
            parsed = card === "BTG" ? parseBTG(text, fatura) : parseItau(text, card, fatura);
          }

          parsed = dedup(parsed);
          // Apply rename map
          parsed = parsed.map(t => {
            const key = t.desc.toLowerCase().trim();
            const rule = currentMap[key];
            if (rule) return { ...t, origDesc: t.desc, desc: rule.desc, cat: rule.cat };
            return { ...t, origDesc: t.desc };
          });
          // Dedup against existing + already parsed from other files in this batch
          const newOnly = parsed.filter(t => {
            const key = `${t.date}|${(t.origDesc || t.desc).substring(0,30)}|${t.amount.toFixed(2)}|${t.card}`;
            return !existingKeys.has(key);
          });
          // Add new keys to existing so next file in batch doesn't duplicate
          newOnly.forEach(t => {
            existingKeys.add(`${t.date}|${(t.origDesc || t.desc).substring(0,30)}|${t.amount.toFixed(2)}|${t.card}`);
          });

          totalDuplicates += parsed.length - newOnly.length;
          totalRenamed += newOnly.filter(t => t.origDesc && t.origDesc !== t.desc).length;
          allNew.push(...newOnly);
          fileResults.push({ name: file.name, card, fatura, count: newOnly.length, isExtrato });
        } catch (err) {
          errors.push(`${file.name}: ${err.message}`);
        }
      }

      const total = allNew.reduce((s, t) => s + t.amount, 0);
      const allMonths = [...new Set(allNew.map(t => t.fatura))].sort();
      const newMonths = allMonths.filter(m => !AVAILABLE_MONTHS.some(am => am.key === m));
      const lastFatura = allMonths.length > 0 ? allMonths[allMonths.length - 1] : null;

      setImportState({
        step: "preview", card: fileResults.map(f => f.card).join(", "), fatura: lastFatura,
        fileName: files.length === 1 ? files[0].name : `${files.length} arquivos`,
        isExtrato: false, transactions: allNew, total, renamed: totalRenamed,
        duplicatesRemoved: totalDuplicates, newMonths, allMonths, fileResults, errors,
      });
    } catch (err) {
      console.error(err);
      setImportState({ step: "error", message: `Erro ao processar PDFs: ${err.message}` });
    }
  };

  const confirmImport = () => {
    if (!importState || importState.step !== "preview") return;
    const newTxns = importState.transactions;
    // Add new months to AVAILABLE_MONTHS if needed
    const monthNames = ["","Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    if (importState.newMonths) {
      for (const mk of importState.newMonths) {
        const [y, m] = mk.split("-");
        const label = `${monthNames[parseInt(m)]} ${y}`;
        if (!AVAILABLE_MONTHS.find(am => am.key === mk)) {
          AVAILABLE_MONTHS.push({ key: mk, label });
        }
      }
      AVAILABLE_MONTHS.sort((a, b) => a.key.localeCompare(b.key));
    }
    setTransactions(prev => [...prev, ...newTxns]);
    setSelectedMonthKey(importState.fatura);
    setImportState({ step: "done", count: newTxns.length, fatura: importState.fatura });
    setShowUpload(false);
    setTimeout(() => setImportState(null), 3000);
  };

  // ─── Gastos Tab ───

  // Build autocomplete suggestions
  const searchSuggestions = useMemo(() => {
    if (!searchQuery || searchQuery.length < 1) return [];
    const q = searchQuery.toLowerCase();
    const suggestions = [];
    const seen = new Set();

    // Category matches
    Object.entries(categoryMeta).forEach(([name, meta]) => {
      if (name.toLowerCase().includes(q) && !seen.has("cat:" + name)) {
        seen.add("cat:" + name);
        suggestions.push({ type: "cat", label: name, icon: meta.icon, color: meta.color });
      }
    });

    // Merchant matches from all transactions
    [...HISTORICAL_TRANSACTIONS, ...transactions].forEach(t => {
      const desc = t.desc;
      const key = desc.toLowerCase().trim();
      if (key.includes(q) && !seen.has("tx:" + key)) {
        seen.add("tx:" + key);
        const meta = categoryMeta[t.cat] || { icon: "📋", color: "#64748b" };
        suggestions.push({ type: "tx", label: desc, icon: meta.icon, cat: t.cat });
      }
    });

    // Sort: categories first, then merchants alphabetically, limit to 12
    suggestions.sort((a, b) => {
      if (a.type !== b.type) return a.type === "cat" ? -1 : 1;
      return a.label.localeCompare(b.label);
    });
    return suggestions.slice(0, 12);
  }, [searchQuery, transactions, categoryMeta]);

  const getSearchResults = () => {
    if (!searchTerm || searchTerm.length < 2) return null;
    const q = searchTerm.toLowerCase().trim();
    if (!q) return null;

    const periodMap = { "1M": 1, "3M": 3, "6M": 6, "12M": 12 };
    const numMonths = periodMap[searchPeriod] || 6;
    const visibleMonths = ALL_SEARCH_MONTHS.slice(-numMonths);
    const visibleKeys = new Set(visibleMonths.map(m => m.key));

    const getMonthKey = (t) => viewMode === "pagamento"
      ? (t.fatura || (t.date ? t.date.substring(0, 7) : ""))
      : (t.date ? t.date.substring(0, 7) : (t.fatura || ""));

    const allTxns = [...HISTORICAL_TRANSACTIONS, ...transactions];
    const matches = allTxns.filter(t => {
      if (!t.desc.toLowerCase().includes(q) && !(t.cat && t.cat.toLowerCase().includes(q))) return false;
      return visibleKeys.has(getMonthKey(t));
    });

    const byMonth = {};
    visibleMonths.forEach(m => { byMonth[m.key] = { label: m.label, total: 0, transactions: [] }; });
    matches.forEach(t => {
      const mk = getMonthKey(t);
      if (byMonth[mk]) {
        byMonth[mk].total += t.amount;
        byMonth[mk].transactions.push(t);
      }
    });

    const monthlyData = visibleMonths.map(m => ({ month: m.label, total: byMonth[m.key].total, transactions: byMonth[m.key].transactions }));
    const totalAll = matches.reduce((s, t) => s + t.amount, 0);
    const avgMonth = numMonths > 0 ? totalAll / numMonths : 0;
    const merchants = [...new Set(matches.map(t => t.desc))];

    return { monthlyData, matches, totalAll, avgMonth, merchants };
  };

  const renderGastos = () => {
    if (selectedCategory) {
      const cat = computedCategories.find(c => c.name === selectedCategory);
      if (!cat) {
        // Category no longer has transactions — go back
        setTimeout(() => setSelectedCategory(null), 0);
        return null;
      }
      return (
        <div style={{ animation: "slideIn 0.3s ease" }}>
          <button onClick={() => setSelectedCategory(null)}
            style={{ background: "none", border: "none", color: "#0ea5e9", cursor: "pointer", fontSize: 14, padding: "0 0 16px", display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit" }}>
            ← Voltar
          </button>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
            <span style={{ fontSize: 28 }}>{cat.icon}</span>
            <div>
              <h2 style={{ margin: 0, fontSize: 20, color: "#f1f5f9" }}>{cat.name}</h2>
              <p style={{ margin: "2px 0 0", fontSize: 14, color: "#94a3b8" }}>{cat.transactions.length} lançamentos · {fmt(cat.total)}</p>
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
            {cat.transactions.map((t, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", background: i % 2 === 0 ? "#0f1219" : "transparent", borderRadius: 10 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 2, flex: 1, minWidth: 0 }}>
                  <span style={{ color: "#f1f5f9", fontSize: 14, fontWeight: 500 }}>{t.desc}</span>
                  <span style={{ color: "#64748b", fontSize: 12 }}>{new Date(t.date).toLocaleDateString("pt-BR", { day: "2-digit", month: "short" })} · {t.card}</span>
                </div>
                <span style={{ color: "#f1f5f9", fontSize: 14, fontWeight: 600, marginRight: 8 }}>{fmt(t.amount)}</span>
                <button onClick={(e) => { e.stopPropagation(); openEditTx(t); }}
                  style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", fontSize: 18, padding: "4px 6px", lineHeight: 1, fontFamily: "inherit", borderRadius: 6 }}
                  onMouseEnter={(e) => e.currentTarget.style.color = "#94a3b8"}
                  onMouseLeave={(e) => e.currentTarget.style.color = "#475569"}>
                  ⋯
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    const searchResults = searchActive ? getSearchResults() : null;

    // Search results view
    if (searchActive) {
      const showDropdown = searchQuery.length >= 1 && searchQuery !== searchTerm && searchSuggestions.length > 0;
      const doSearch = (term) => { setSearchTerm(term); setSearchQuery(term); };
      return (
        <div style={{ animation: "slideIn 0.3s ease" }}>
          <button onClick={() => { setSearchActive(false); setSearchQuery(""); setSearchTerm(""); }}
            style={{ background: "none", border: "none", color: "#0ea5e9", cursor: "pointer", fontSize: 14, padding: "0 0 16px", display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit" }}>
            ← Voltar
          </button>

          {/* Search input */}
          <div style={{ position: "relative", marginBottom: 24 }}>
            <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", color: "#475569", fontSize: 16, pointerEvents: "none", zIndex: 2 }}>🔍</span>
            <input type="text" value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter" && searchQuery.length >= 2) { doSearch(searchQuery); e.target.blur(); } }}
              placeholder="Buscar lançamento ou categoria..."
              autoFocus
              style={{ ...inputStyle, paddingLeft: 40, fontSize: 15, padding: "14px 14px 14px 40px", borderRadius: showDropdown ? "12px 12px 0 0" : 12, background: "#0f1219", border: "1px solid #1e293b", position: "relative", zIndex: 2 }} />
            {searchQuery && (
              <button onMouseDown={(e) => { e.preventDefault(); setSearchQuery(""); setSearchTerm(""); }}
                style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#475569", cursor: "pointer", fontSize: 16, padding: 4, zIndex: 3 }}>
                ✕
              </button>
            )}

            {/* Suggestions dropdown */}
            {showDropdown && (
              <div style={{ position: "absolute", left: 0, right: 0, top: "100%", background: "#0f1219", border: "1px solid #1e293b", borderTop: "1px solid #1a2030", borderRadius: "0 0 12px 12px", zIndex: 10, maxHeight: 320, overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
                {searchSuggestions.map((s, i) => (
                  <div key={s.type + s.label + i}
                    onTouchEnd={(e) => { e.preventDefault(); doSearch(s.label); }}
                    onMouseDown={(e) => { e.preventDefault(); doSearch(s.label); }}
                    style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "10px 16px", borderBottom: i < searchSuggestions.length - 1 ? "1px solid #111827" : "none", color: "#e2e8f0", fontSize: 13, cursor: "pointer", userSelect: "none", WebkitUserSelect: "none" }}
                    onMouseEnter={(e) => e.currentTarget.style.background = "#111827"}
                    onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
                    <span style={{ fontSize: 16, width: 24, textAlign: "center" }}>{s.icon}</span>
                    <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.label}</span>
                    <span style={{ fontSize: 10, color: "#475569", padding: "2px 8px", borderRadius: 4, background: "#111827", flexShrink: 0 }}>
                      {s.type === "cat" ? "categoria" : s.cat || ""}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {searchTerm && searchResults ? (
            <>
              {/* Summary */}
              <div style={{ marginBottom: 20 }}>
                <h2 style={{ margin: 0, fontSize: 18, color: "#f1f5f9", fontWeight: 600 }}>
                  {searchResults.merchants.length === 1 ? searchResults.merchants[0] : `"${searchTerm}"`}
                </h2>
                <div style={{ display: "flex", gap: 20, marginTop: 8 }}>
                  <div>
                    <p style={{ margin: 0, fontSize: 11, color: "#475569", textTransform: "uppercase", letterSpacing: 0.5 }}>Total ({searchPeriod})</p>
                    <p style={{ margin: "2px 0 0", fontSize: 18, color: "#f1f5f9", fontWeight: 700 }}>{fmt(searchResults.totalAll)}</p>
                  </div>
                  <div>
                    <p style={{ margin: 0, fontSize: 11, color: "#475569", textTransform: "uppercase", letterSpacing: 0.5 }}>Média mensal</p>
                    <p style={{ margin: "2px 0 0", fontSize: 18, color: "#94a3b8", fontWeight: 600 }}>{fmt(searchResults.avgMonth)}</p>
                  </div>
                  <div>
                    <p style={{ margin: 0, fontSize: 11, color: "#475569", textTransform: "uppercase", letterSpacing: 0.5 }}>Lançamentos</p>
                    <p style={{ margin: "2px 0 0", fontSize: 18, color: "#94a3b8", fontWeight: 600 }}>{searchResults.matches.length}</p>
                  </div>
                </div>
              </div>

              {/* Monthly bar chart */}
              <div style={{ background: "#0f1219", borderRadius: 16, padding: 20, border: "1px solid #1e293b", marginBottom: 28 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                  <p style={{ margin: 0, fontSize: 13, color: "#64748b" }}>Gasto por mês</p>
                  <div style={{ display: "flex", gap: 4 }}>
                    {["1M", "3M", "6M", "12M"].map(p => (
                      <button key={p} onClick={() => setSearchPeriod(p)}
                        style={{
                          padding: "4px 12px", borderRadius: 6, fontSize: 12, fontWeight: 600,
                          fontFamily: "inherit", cursor: "pointer", transition: "all 0.2s",
                          background: searchPeriod === p ? "#0ea5e9" : "transparent",
                          border: searchPeriod === p ? "none" : "1px solid #1e293b",
                          color: searchPeriod === p ? "#fff" : "#64748b",
                        }}>
                        {p}
                      </button>
                    ))}
                  </div>
                </div>
                {(() => {
                  const data = searchResults.monthlyData;
                  const max = Math.max(...data.map(d => d.total)) || 1;
                  const manyBars = data.length > 6;
                  return (
                    <div style={{ display: "flex", alignItems: "flex-end", gap: manyBars ? 4 : 12, height: 140, padding: "0 4px" }}>
                      {data.map((d, i) => {
                        const h = d.total > 0 ? Math.max((d.total / max) * 110, 4) : 0;
                        const isLast = i === data.length - 1;
                        return (
                          <div key={d.month + i} style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, gap: manyBars ? 3 : 6 }}>
                            <span style={{ fontSize: manyBars ? 9 : 11, color: d.total > 0 ? "#e2e8f0" : "#334155", fontWeight: 500, whiteSpace: "nowrap" }}>
                              {d.total > 0 ? (manyBars ? fmtK(Math.round(d.total)) : fmt(d.total)) : "—"}
                            </span>
                            <div style={{
                              width: "100%", height: h, borderRadius: 6, minHeight: d.total > 0 ? 4 : 0,
                              background: d.total > 0
                                ? isLast ? "linear-gradient(180deg, #0ea5e9, #0369a1)" : "#0ea5e933"
                                : "#111827",
                              transition: "height 0.5s ease",
                            }} />
                            <span style={{ fontSize: manyBars ? 9 : 11, color: isLast ? "#f1f5f9" : "#64748b", fontWeight: isLast ? 600 : 400 }}>{d.month}</span>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
              </div>

              {/* Transaction list grouped by month */}
              <p style={{ margin: "0 0 12px", fontSize: 13, color: "#64748b", letterSpacing: 1, textTransform: "uppercase" }}>Todos os lançamentos</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {searchResults.monthlyData.slice().reverse().filter(m => m.transactions.length > 0).map(m => (
                  <div key={m.month}>
                    <div style={{ padding: "8px 16px", display: "flex", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 12, color: "#475569", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>{m.month}</span>
                      <span style={{ fontSize: 12, color: "#64748b" }}>{fmt(m.total)}</span>
                    </div>
                    {m.transactions.sort((a, b) => b.date.localeCompare(a.date)).map((t, i) => (
                      <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 16px", background: i % 2 === 0 ? "#0f1219" : "transparent", borderRadius: 8 }}>
                        <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                          <span style={{ color: "#f1f5f9", fontSize: 14, fontWeight: 500 }}>{t.desc}</span>
                          <span style={{ color: "#64748b", fontSize: 12 }}>{new Date(t.date).toLocaleDateString("pt-BR", { day: "2-digit", month: "short" })} · {t.card} · {t.cat}</span>
                        </div>
                        <span style={{ color: "#f1f5f9", fontSize: 14, fontWeight: 600 }}>{fmt(t.amount)}</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </>
          ) : (
            <div style={{ textAlign: "center", padding: "60px 20px" }}>
              <div style={{ fontSize: 40, marginBottom: 12, opacity: 0.4 }}>🔍</div>
              <p style={{ color: "#475569", fontSize: 14 }}>
                {!searchTerm
                  ? "Digite e selecione uma opção da lista..."
                  : `Nenhum lançamento encontrado para "${searchTerm}"`}
              </p>
            </div>
          )}
        </div>
      );
    }

    return (
      <>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div>
            <p style={{ margin: 0, fontSize: 13, color: "#64748b", letterSpacing: 1, textTransform: "uppercase" }}>
              {viewMode === "pagamento" ? "Total pago no mês" : "Lançamentos do mês"}
            </p>
            <h2 style={{ margin: "4px 0 0", fontSize: 28, color: "#f1f5f9", fontWeight: 700 }}>{fmt(totalSpend)}</h2>
            {filteredTransactions.length === 0 && (
              <p style={{ margin: "8px 0 0", fontSize: 13, color: "#475569" }}>
                Nenhum {viewMode === "lancamento" ? "lançamento" : "pagamento"} encontrado neste mês
              </p>
            )}
          </div>
          <button onClick={() => { setShowUpload(!showUpload); setImportState(null); }}
            style={{ background: "linear-gradient(135deg, #0ea5e9, #0369a1)", border: "none", color: "#fff", padding: "10px 20px", borderRadius: 10, cursor: "pointer", fontSize: 13, fontWeight: 600, fontFamily: "inherit" }}>
            + Importar PDF
          </button>
        </div>

        {showUpload && (
          <div style={{ borderRadius: 16, marginBottom: 24, overflow: "hidden", border: "1px solid #1e293b", background: "#0a0e17" }}>
            <input ref={fileInputRef} type="file" accept="application/pdf,.pdf" multiple style={{ display: "none" }}
              onChange={(e) => { if (e.target.files.length > 0) handleFilesImport(e.target.files); e.target.value = ""; }} />

            {/* Drop zone / file picker (only when no import in progress) */}
            {(!importState || importState.step === "error") && (
              <div
                onDragOver={(e) => { e.preventDefault(); setUploadHover(true); }}
                onDragLeave={() => setUploadHover(false)}
                onDrop={(e) => { e.preventDefault(); setUploadHover(false); if (e.dataTransfer.files.length > 0) handleFilesImport(e.dataTransfer.files); }}
                onClick={() => fileInputRef.current?.click()}
                style={{ padding: 32, textAlign: "center", cursor: "pointer",
                  borderBottom: importState?.step === "error" ? "none" : undefined,
                  background: uploadHover ? "rgba(14,165,233,0.05)" : "transparent",
                  border: `2px dashed ${uploadHover ? "#0ea5e9" : "#1e293b"}`, borderRadius: 14, margin: 8,
                  transition: "all 0.3s" }}>
                <div style={{ fontSize: 36, marginBottom: 8 }}>📄</div>
                <p style={{ color: "#94a3b8", margin: 0, fontSize: 14 }}>
                  Toque para <span style={{ color: "#0ea5e9", textDecoration: "underline" }}>selecionar PDFs</span> de faturas ou extratos
                </p>
                <p style={{ color: "#475569", margin: "8px 0 0", fontSize: 12 }}>Faturas: Itaú (Visa Infinite, Latam Pass), BTG · Extratos: Itaú CC, BTG CC</p>
              </div>
            )}

            {/* Loading */}
            {importState?.step === "loading" && (
              <div style={{ padding: 32, textAlign: "center" }}>
                <div style={{ fontSize: 28, marginBottom: 12, animation: "spin 1s linear infinite" }}>⏳</div>
                <p style={{ color: "#94a3b8", margin: 0, fontSize: 14 }}>Processando {importState.fileName}...</p>
                <style>{`@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`}</style>
              </div>
            )}

            {/* Error */}
            {importState?.step === "error" && (
              <div style={{ padding: "16px 24px", background: "rgba(239,68,68,0.08)", borderTop: "1px solid rgba(239,68,68,0.2)" }}>
                <p style={{ color: "#f87171", margin: 0, fontSize: 13 }}>⚠️ {importState.message}</p>
              </div>
            )}

            {/* Preview */}
            {importState?.step === "preview" && (
              <div style={{ padding: 24 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                  <span style={{ fontSize: 20 }}>✅</span>
                  <div>
                    <p style={{ margin: 0, fontSize: 15, color: "#f1f5f9", fontWeight: 600 }}>{importState.fileName}</p>
                    {importState.fileResults && importState.fileResults.length > 1 && (
                      <div style={{ margin: "6px 0 0" }}>
                        {importState.fileResults.map((f, i) => (
                          <p key={i} style={{ margin: "2px 0", fontSize: 11, color: "#64748b" }}>
                            {f.name}: {f.card} · {f.count} novos
                          </p>
                        ))}
                      </div>
                    )}
                    {importState.fileResults && importState.fileResults.length === 1 && (
                      <p style={{ margin: "2px 0 0", fontSize: 12, color: "#64748b" }}>
                        {importState.fileResults[0].card} · {importState.fileResults[0].isExtrato
                          ? `Extrato${importState.allMonths?.length > 1 ? ` (${importState.allMonths.length} meses)` : ` ${importState.fileResults[0].fatura}`}`
                          : `Fatura ${importState.fileResults[0].fatura}`}
                      </p>
                    )}
                  </div>
                </div>
                {importState.errors && importState.errors.length > 0 && (
                  <div style={{ marginBottom: 12, padding: "8px 12px", background: "rgba(239,68,68,0.08)", borderRadius: 8 }}>
                    {importState.errors.map((err, i) => (
                      <p key={i} style={{ margin: "2px 0", fontSize: 11, color: "#f87171" }}>⚠️ {err}</p>
                    ))}
                  </div>
                )}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 16 }}>
                  <div style={{ background: "#111827", borderRadius: 10, padding: "12px 14px", textAlign: "center" }}>
                    <p style={{ margin: 0, fontSize: 22, color: "#f1f5f9", fontWeight: 700 }}>{importState.transactions.length}</p>
                    <p style={{ margin: "2px 0 0", fontSize: 11, color: "#64748b" }}>transações</p>
                  </div>
                  <div style={{ background: "#111827", borderRadius: 10, padding: "12px 14px", textAlign: "center" }}>
                    <p style={{ margin: 0, fontSize: 16, color: "#f1f5f9", fontWeight: 700 }}>{fmt(importState.total)}</p>
                    <p style={{ margin: "2px 0 0", fontSize: 11, color: "#64748b" }}>total</p>
                  </div>
                  <div style={{ background: "#111827", borderRadius: 10, padding: "12px 14px", textAlign: "center" }}>
                    <p style={{ margin: 0, fontSize: 22, color: "#0ea5e9", fontWeight: 700 }}>{importState.renamed}</p>
                    <p style={{ margin: "2px 0 0", fontSize: 11, color: "#64748b" }}>renomeadas</p>
                  </div>
                </div>
                {importState.duplicatesRemoved > 0 && (
                  <p style={{ margin: "0 0 12px", fontSize: 12, color: "#475569" }}>
                    🔄 {importState.duplicatesRemoved} lançamentos já existentes foram ignorados
                  </p>
                )}
                {importState.transactions.length === 0 ? (
                  <div>
                    <p style={{ margin: "0 0 16px", fontSize: 13, color: "#64748b" }}>
                      ✓ Todos os lançamentos deste arquivo já estão no app.
                    </p>
                    <button onClick={() => { setImportState(null); if (fileInputRef.current) fileInputRef.current.value = ""; }}
                      style={{ padding: "10px 20px", borderRadius: 10, background: "transparent", border: "1px solid #1e293b", color: "#94a3b8", fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
                      Ok
                    </button>
                  </div>
                ) : (
                  <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
                    <button onClick={() => { setImportState(null); if (fileInputRef.current) fileInputRef.current.value = ""; }}
                      style={{ padding: "10px 20px", borderRadius: 10, background: "transparent", border: "1px solid #1e293b", color: "#94a3b8", fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
                      Cancelar

  // ─── Investimentos Tab ───

  const renderInvest = () => {

        <div style={{ marginBottom: 24 }}>

              <div key={c.name} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: c.color }} />

              </div>

          </div>
        </div>

              <div key={cat.name}>

                  onMouseLeave={(e) => e.currentTarget.style.background = "#0f1219"}>

                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <p style={{ margin: 0, color: "#f1f5f9", fontSize: 15, fontWeight: 600 }}>{fmt(cat.value)}</p>
                    <span style={{ color: "#475569", fontSize: 16, transition: "transform 0.2s", transform: isExpanded ? "rotate(90deg)" : "none" }}>›</span>

                  <div style={{ animation: "slideIn 0.2s ease", marginTop: 2, marginLeft: isMobile ? 8 : 20, borderLeft: `2px solid ${cat.color}22` }}>

                      <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr 1fr 1.2fr 44px", padding: "10px 16px", gap: 8 }}>

                        <span style={{ fontSize: 11, color: "#475569", textTransform: "uppercase", letterSpacing: 0.5, textAlign: "right" }}>Total</span>
                        <span />

                      const gain = h.precoMedio !== 0 ? ((h.precoAtual - h.precoMedio) / h.precoMedio * 100) : 0;

                            <div>
                              <span style={{ color: "#f1f5f9", fontSize: 13, fontWeight: 600 }}>{h.ativo}</span>

                            </div>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <span style={{ color: "#f1f5f9", fontSize: 13, fontWeight: 600 }}>{fmt(h.valorTotal)}</span>
                              <button onClick={(e) => { e.stopPropagation(); openEditHolding(h); }}
                                style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", padding: "2px", fontSize: 13 }}>✎</button>
                              <button onClick={(e) => { e.stopPropagation(); deleteHolding(h.id); }}
                                style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", padding: "2px", fontSize: 15 }}>×</button>
                            </div>
                          </div>
                          <div style={{ display: "flex", gap: 12, marginTop: 4, fontSize: 11, color: "#64748b" }}>
                            <span>PM: {fmtNum(h.precoMedio)}</span>
                            <span>Atual: {fmtNum(h.precoAtual)}</span>
                          </div>
                        </div>
                      ) : (
                        <div key={h.id}
                          style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr 1fr 1.2fr 44px", padding: "12px 16px", gap: 8, borderRadius: 8, alignItems: "center", background: "#0a0e17", marginBottom: 2, transition: "background 0.15s" }}
                          onMouseEnter={(e) => e.currentTarget.style.background = "#0f1219"}
                          onMouseLeave={(e) => e.currentTarget.style.background = "#0a0e17"}>
                          <div>
                            <span style={{ color: "#f1f5f9", fontSize: 14, fontWeight: 600 }}>{h.ativo}</span>

                              onMouseLeave={(e) => e.currentTarget.style.color = "#475569"}>

                              style={{ background: "none", border: "none", color: "#475569", cursor: "pointer", padding: "2px 4px", fontSize: 15, borderRadius: 4 }}
                              onMouseEnter={(e) => e.currentTarget.style.color = "#ef4444"}

          padding: 32, width: 460, maxWidth: "90vw", animation: "modalIn 0.3s ease",
        }}>
          <h3 style={{ margin: "0 0 24px", fontSize: 18, color: "#f1f5f9", fontWeight: 600 }}>
            {editingHolding ? "Editar Ativo" : "Adicionar Ativo"}

          {/* Categoria chips */}
          <div style={{ marginBottom: 18 }}>
            <label style={labelStyle}>Categoria</label>

                <button key={cat.name}
                  onClick={() => setNewHolding(prev => ({ ...prev, categoria: cat.name }))}

                    background: newHolding.categoria === cat.name ? cat.color + "22" : "#0a0e17",

          {/* Ativo */}
          <div style={{ marginBottom: 18 }}>

          </div>

          {/* Preço Médio + Preço Atual */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 18 }}>
            <div>
              <label style={labelStyle}>Preço Médio</label>
              <input type="number" step="0.01" placeholder="0.00"

            </div>
            <div>
              <label style={labelStyle}>Preço Atual</label>
              <input type="number" step="0.01" placeholder="0.00"
                value={newHolding.precoAtual}
                onChange={(e) => setNewHolding(prev => ({ ...prev, precoAtual: e.target.value }))}

          </div>

          <div style={{ marginBottom: 28 }}>

              value={newHolding.valorTotal}
              onChange={(e) => setNewHolding(prev => ({ ...prev, valorTotal: e.target.value }))}

          </div>

          {/* Gain preview */}

            <div style={{ marginBottom: 20, padding: "10px 14px", borderRadius: 10, background: "#080b12", border: "1px solid #1e293b" }}>

                const pa = parseFloat(newHolding.precoAtual);
                const gain = pm ? ((pa - pm) / pm * 100) : 0;
                return (
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 12, color: "#64748b" }}>Rentabilidade</span>
                    <span style={{ fontSize: 14, fontWeight: 600, color: gain > 0 ? "#10b981" : gain < 0 ? "#ef4444" : "#64748b" }}>
                      {gain > 0 ? "+" : ""}{gain.toFixed(2)}%
                    </span>
                  </div>
                );
              })()}
            </div>
          )}

          {/* Actions */}
          <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
            <button onClick={() => setShowInputModal(false)}
              style={{ padding: "10px 24px", borderRadius: 10, background: "transparent", border: "1px solid #1e293b", color: "#94a3b8", fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>

            </button>
          </div>
        </div>
      </div>

        </h1>
        <div style={{ display: "flex", alignItems: "center", gap: isMobile ? 4 : 6 }}>
          {activeTab === "gastos" && (
            <div style={{ display: "flex", borderRadius: 8, overflow: "hidden", border: "1px solid #1e293b" }}>
              {["lancamento", "pagamento"].map(mode => (
                <button key={mode} onClick={() => { setViewMode(mode); setSelectedCategory(null); }}
                  style={{
                    background: viewMode === mode ? "#0ea5e9" : "transparent",
                    border: "none", color: viewMode === mode ? "#fff" : "#64748b",
                    padding: isMobile ? "6px 8px" : "7px 12px", fontSize: isMobile ? 11 : 12, fontWeight: 600, cursor: "pointer",
                    fontFamily: "inherit", transition: "all 0.2s",
                  }}>
                  {mode === "lancamento" ? "Lanç." : "Pgto."}
                </button>
              ))}

          <div style={{ position: "relative" }}>

              <div style={{ position: "absolute", right: 0, top: "110%", background: "#0f1219", border: "1px solid #1e293b", borderRadius: 12, padding: 6, zIndex: 50, minWidth: 140, animation: "fadeIn 0.15s ease" }}>
                {AVAILABLE_MONTHS.slice().reverse().map(m => (
                  <button key={m.key} onClick={() => { setSelectedMonthKey(m.key); setShowMonthPicker(false); setSelectedCategory(null); }}
                    style={{
                      display: "block", width: "100%", textAlign: "left", padding: "8px 12px", borderRadius: 8,
                      background: selectedMonthKey === m.key ? "#1e293b" : "transparent",
                      border: "none", color: selectedMonthKey === m.key ? "#f1f5f9" : "#94a3b8",
                      fontSize: 13, cursor: "pointer", fontFamily: "inherit", fontWeight: selectedMonthKey === m.key ? 600 : 400,

                    {m.label}
